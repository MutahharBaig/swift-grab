name: Build Android APK

# Builds the APK in the cloud (no Linux needed on your PC).
# Runs on every push and can be started manually from the Actions tab.
on:
  push:
  workflow_dispatch:

jobs:
  build-apk:
    # Pinned to 22.04 on purpose — the Android build tools need libraries
    # that were removed from Ubuntu 24.04.
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev build-essential ccache

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip wheel
          pip install "Cython==0.29.36" buildozer

      - name: Build the debug APK
        working-directory: android
        # Let Buildozer download/install the SDK itself; 'yes |' auto-accepts
        # every Android SDK license prompt as it goes.
        run: yes | buildozer android debug

      - name: Upload the APK
        uses: actions/upload-artifact@v4
        with:
          name: SwiftGrab-apk
          path: android/bin/*.apk
          if-no-files-found: error
