name: Build Android APK

# Builds the APK in the cloud (no Linux needed on your PC).
# Runs on every push and can be started manually from the Actions tab.
on:
  push:
  workflow_dispatch:

jobs:
  build-apk:
    # Pinned to 22.04 on purpose — the Android build tools need libraries
    # that were removed from Ubuntu 24.04.
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            git zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses-dev libncursesw5-dev libtinfo5 \
            cmake libffi-dev libssl-dev build-essential ccache

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip wheel
          pip install "Cython==0.29.36" buildozer

      - name: Pre-accept Android SDK licenses
        run: |
          SDK="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK/licenses"
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55"  > "$SDK/licenses/android-sdk-license"
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> "$SDK/licenses/android-sdk-license"
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> "$SDK/licenses/android-sdk-license"
          echo "84831b9409646a918e30573bab4c9c91346d8abd"  > "$SDK/licenses/android-sdk-preview-license"
          echo "601085b94cd77f0b54ff86406957099ebe79c4d6"  > "$SDK/licenses/android-googletv-license"
          echo "33b6a2b64607f11b759f320ef9dff4ae5c47d97a"  > "$SDK/licenses/google-gdk-license"
          echo "e9acab5b5fbb560a72cfaecce8946896ff6aab9d"  > "$SDK/licenses/mips-android-sysimage-license"

      - name: Build the debug APK
        working-directory: android
        # 'yes |' answers any remaining interactive prompt with "y".
        run: yes | buildozer android debug

      - name: Upload the APK
        uses: actions/upload-artifact@v4
        with:
          name: SwiftGrab-apk
          path: android/bin/*.apk
          if-no-files-found: error
