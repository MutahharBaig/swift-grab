name: Build Android APK

# Builds the APK in the cloud (no Linux needed on your PC).
# Runs on every push, and can be started manually from the Actions tab.
on:
  push:
    paths:
      - "android/**"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build the debug APK with Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        with:
          workdir: android
          command: buildozer android debug

      - name: Upload the APK
        uses: actions/upload-artifact@v4
        with:
          name: SwiftGrab-apk
          path: android/bin/*.apk
          if-no-files-found: error
